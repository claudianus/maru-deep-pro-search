<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>
{{BASE_CSS}}
body {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #042f2e 0%, #0f172a 50%, #1e1b4b 100%);
  padding: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
h1 { font-family: Inter, sans-serif; font-size: 42px; color: #fff; margin-bottom: 12px; }
h1 span { background: linear-gradient(135deg,#2dd4bf,#0ea5e9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p { font-family: Inter, sans-serif; font-size: 18px; color: #94a3b8; max-width: 720px; }
.badge { display:inline-block; margin-top:20px; padding:6px 14px; border-radius:999px; background:rgba(45,212,191,.15); color:#2dd4bf; font-size:14px; }
.panel { margin-top:24px; max-width:900px; font-size:10px; opacity:.9; border:1px solid #30363d; border-radius:8px; padding:12px; background:rgba(0,0,0,.35); }
</style>
</head>
<body>
<h1>Research <span>before</span> you code</h1>
<p>Free MCP harness: 9-engine deep search, Granite semantic ranking, native citations — $0 API keys.</p>
<span class="badge">v0.22.1 · Granite 97M · install warmup</span>
<div class="panel">{{panel_snippet}}</div>
</body>
</html>
